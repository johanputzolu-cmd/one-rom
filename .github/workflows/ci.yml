name: CI Build

permissions:
  contents: write
  actions: read

on:
  workflow_dispatch:
  push:
    paths:
      - 'Makefile'
      - 'ci/**'
      - '!ci/docker/**'
      - 'sdrr/**'
      - 'rust/**'
      - 'old-config/**'
      - 'test/**'
      - 'hw-config/**'
      - '.github/**'
      - '!.github/workflows/release.yml'
      - '!**.md'
      - '!docs/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Makefile'
      - 'ci/**'
      - '!ci/docker/**'
      - 'sdrr/**'
      - 'rust/**'
      - 'old-config/**'
      - 'test/**'
      - 'hw-config/**'
      - '.github/**'
      - '!.github/workflows/release.yml'
      - '!**.md'
      - '!docs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y dfu-util gcc-arm-none-eabi jq libcurl4-openssl-dev libjson-c-dev libzip-dev make
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Rust wasm-pack
      run: cargo install wasm-pack

    - name: Run various Rust tests
      run: |
        export TOOLCHAIN=/usr/bin
        ci/rust-tests.sh

    - name: Build Rust docs
      run: |
        export TOOLCHAIN=/usr/bin
        ci/rust-docs.sh

    - name: Test option combinations
      run: |
        export TOOLCHAIN=/usr/bin
        ci/build.sh test

    - name: Run emulated PIO tests
      run: |
        export TOOLCHAIN=/usr/bin
        ci/test-pios.sh
      
    - name: Build firmware for all image configs
      run: |
        export TOOLCHAIN=/usr/bin
        ci/build.sh ci

    - name: Build plugins
      run: |
        export TOOLCHAIN=/usr/bin
        make clean
        HW_REV=fire-24-e MCU=rp2350 ROM_CONFIGS= EXCLUDE_METADATA=1 make
        make -C plugins/system/usb
        make -C plugins/user/activity
        make -C plugins/user/blink
        make -C plugins/user/host-control
        make -C sdrr/ora/examples

    - name: Build tools
      run: |
        export TOOLCHAIN=/usr/bin
        ci/rust-tools.sh
